services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: agriagent-backend
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src:/app/backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: agriagent-frontend
    depends_on:
      - backend
    ports:
      - "3003:80"
    restart: unless-stopped
