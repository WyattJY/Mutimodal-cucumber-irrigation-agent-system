# Ultralytics YOLO 🚀, AGPL-3.0 license
# YOLOv8 object detection model with P3-P5 outputs. For Usage examples see https://docs.ultralytics.com/tasks/detect

# Parameters
nc: 4 # number of classes
scales: # model compound scaling constants, i.e. 'model=yolov8n.yaml' will call yolov8.yaml with scale 'n'
  # [depth, width, max_channels]
  n: [ 0.33, 0.25, 1024, 6 ]
#  n: [0.33, 0.25, 1024] # YOLOv8n summary: 225 layers,  3157200 parameters,  3157184 gradients,   8.9 GFLOPs
#  s: [0.50, 0.50, 1024,6] # YOLOv8s summary: 225 layers, 11166560 parameters, 11166544 gradients,  28.8 GFLOPs
#  m: [0.67, 0.75, 768] # YOLOv8m summary: 295 layers, 25902640 parameters, 25902624 gradients,  79.3 GFLOPs
#  l: [1.00, 1.00, 512] # YOLOv8l summary: 365 layers, 43691520 parameters, 43691504 gradients, 165.7 GFLOPs
#  x: [1.00, 1.25, 512] # YOLOv8x summary: 365 layers, 68229648 parameters, 68229632 gradients, 258.5 GFLOPs

# YOLOv8.0n backbone
backbone:
  # [from, repeats, module, args]
  - [ -1, 1, Conv, [ 64, 3, 2 ] ] # 0-P1/2
  - [ -1, 1, Conv, [ 128, 3, 2 ] ] # 1-P2/4
  - [ -1, 2, Faster_Block_CPCA, [ 256 ] ]
  - [ -1, 1, Conv, [ 256, 3, 2 ] ] # 3-P3/8
  - [ -1, 2, Faster_Block_CPCA, [ 512 ] ]
  - [ -1, 1, Conv, [ 512, 3, 2 ] ] # 5-P4/16
  - [ -1, 2, C3k2_FBC, [ 512, True ] ]
  - [ -1, 1, Conv, [ 1024, 3, 2 ] ] # 7-P5/32
  - [ -1, 2, C3k2_FBC, [ 1024, True ] ]
  - [ -1, 1, SPPF, [ 1024, 5 ] ] # 9
  - [ -1, 2, C2PSA, [ 1024 ] ] # 10

# head
head:
  # Semantic Collecting
  - [ 0, 1, nn.AvgPool2d, [ 8, 8, 0 ] ] # 11
  - [ 2, 1, nn.AvgPool2d, [ 4, 4, 0 ] ] # 12
  - [ 4, 1, nn.AvgPool2d, [ 2, 2, 0 ] ] # 13
  - [ 10, 1, nn.Upsample, [ None, 2, 'nearest' ] ] # 14
  - [ [ 11, 12, 13, 6, 14 ], 1, Concat, [ 1 ] ]  # cat 15

  # Hypergraph Computation
  - [ -1, 1, Conv, [ 512, 1, 1 ] ] # 16
  - [ -1, 1, HyperComputeModule, [ 512 ] ] # 17
  - [ -1, 2, MANet, [ 512, True, 2, 3 ] ] # 18

  # Semantic Collecting
  - [ -1, 1, nn.AvgPool2d, [ 2, 2, 0 ] ] # 19
  - [ [ -1, 10 ], 1, Concat, [ 1 ] ]  # cat 20
  - [ -1, 1, Conv, [ 1024, 1, 1 ] ] # 21 P5

  - [ [ 18, 6 ], 1, Concat, [ 1 ] ]  # cat 22
  - [ -1, 2, MANet, [ 512, False, 2, 3 ] ]  # 23 P4

  - [ 18, 1, nn.Upsample, [ None, 2, 'nearest' ] ] # 24
  - [ [ -1, 4 ], 1, Concat, [ 1 ] ]  # cat 25
  - [ -1, 2, MANet, [ 256, False, 2, 3 ] ]  # 26 P3/N3

  - [ -1, 1, Conv, [ 256, 3, 2 ] ] # 27
  - [ [ -1, 23 ], 1, Concat, [ 1 ] ]  # 28 cat
  - [ -1, 2, MANet, [ 512, False, 2, 3 ] ]  # 29 N4

  - [ -1, 1, Conv, [ 512, 3, 2 ] ] # 30
  - [ [ -1, 21 ], 1, Concat, [ 1 ] ]  # 31 cat
  - [ -1, 2, C3k2, [ 1024, False ] ]  # 32 N5

  - [ [ 26, 29, 32 ], 1, Segment, [ nc, 32, 256 ] ] # Detect(P3, P4, P5)