# RAG Configuration
# Phase 7: RAG 组件迁移与文献管理

# Milvus 配置
milvus:
  uri: "http://localhost:19530"
  # 系统集合 (只读)
  system_collection: "greenhouse_bge_m3"
  # 用户集合 (可写)
  user_collection: "cucumber_user_literature"

# MongoDB 配置
mongodb:
  uri: "mongodb://localhost:27017"
  # 系统数据库 (只读)
  system_db: "greenhouse_db"
  system_collection: "literature_chunks"
  # 用户数据库 (可写)
  user_db: "cucumber_irrigation"
  user_collection: "user_docs"

# BGE-M3 模型配置
embedding:
  model_name: "BAAI/bge-m3"
  # 本地路径 (可选, 优先使用)
  local_path: null
  # 向量维度
  dense_dim: 1024
  # 批处理大小
  batch_size: 32
  # 设备 (auto/cpu/cuda)
  device: "auto"

# 检索配置
retrieval:
  # 默认返回数量
  default_top_k: 5
  # 权重配置
  weights:
    system: 1.5  # 系统文献权重 (FAO56 等)
    user: 0.8    # 用户文献权重
  # 混合检索配置
  hybrid:
    enabled: true
    sparse_weight: 0.3
    dense_weight: 0.7

# 文献管理配置
literature:
  # 支持的文件格式
  supported_formats:
    - ".pdf"
    - ".txt"
    - ".md"
  # 最大文件大小 (MB)
  max_file_size: 50
  # 分块配置
  chunking:
    chunk_size: 512    # tokens
    overlap: 50        # tokens
    min_chunk_size: 100
  # 用户文献存储路径
  upload_dir: "data/user_literature"
