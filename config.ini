# ============================================
# AGRI-COPILOT Configuration
# Cucumber Irrigation Intelligent Agent System
# ============================================

[server]
# Backend server settings
backend_host=0.0.0.0
backend_port=8000

# Frontend server settings
frontend_host=0.0.0.0
frontend_port=3003

[api]
# LLM API settings (SiliconFlow)
llm_api_key=YOUR_API_KEY_HERE
llm_base_url=https://yunwu.ai/v1
llm_model=gpt-5.2-chat-latest

[paths]
# Data directories (relative to project root)
data_dir=data
models_dir=models
output_dir=output
logs_dir=logs

# Knowledge base
knowledge_base=data/knowledge_base/fao56_chunks.json

# Memory storage
episodes_file=data/storage/episodes.json
weekly_summaries_file=data/storage/weekly_summaries.json

[models]
# YOLO model for plant segmentation
yolo_model=models/yolo/yolo11_seg_best.pt

# TSMixer model for irrigation prediction
tsmixer_model=models/tsmixer/model_state.pt

[rag]
# RAG settings
enabled=true
top_k=3
min_relevance_score=0.1

[memory]
# Memory system settings
l1_working_context=true
l2_episode_store=true
l3_weekly_summary=true
l4_rag_retrieval=true

# History limits
max_conversation_history=40
max_episodes_display=50
